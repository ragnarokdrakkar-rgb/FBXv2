name: Release Windows EXE

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and publish GitHub Release
    runs-on: windows-latest
    timeout-minutes: 35

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install --include=dev

      - name: Verify tag matches package version
        shell: pwsh
        run: |
          $packageVersion = (Get-Content package.json | ConvertFrom-Json).version
          $tagVersion = "${{ github.ref_name }}".TrimStart('v')
          if ($packageVersion -ne $tagVersion) {
            throw "Tag v$tagVersion se ne ujema s package.json verzijo $packageVersion."
          }

      - name: Run tests
        run: npm test

      - name: Build Windows installer and update metadata
        run: npm run dist:win

      - name: Ensure latest.yml exists
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $exe = Get-Item "release\Fuzijska-biopsija-Setup-$version.exe"

          $sha = [System.Security.Cryptography.SHA512]::Create()
          $hash = $sha.ComputeHash(
            [System.IO.File]::ReadAllBytes($exe.FullName)
          )
          $sha512 = [Convert]::ToBase64String($hash)
          $releaseDate = (Get-Date).ToUniversalTime().ToString("o")

          $content = @"
          version: $version
          files:
            - url: $($exe.Name)
              sha512: $sha512
              size: $($exe.Length)
          path: $($exe.Name)
          sha512: $sha512
          releaseDate: '$releaseDate'
          "@

          [System.IO.File]::WriteAllText(
            "$PWD\release\latest.yml",
            $content,
            [System.Text.UTF8Encoding]::new($false)
          )

          if (-not (Test-Path "release\latest.yml")) {
            throw "latest.yml ni bil ustvarjen."
          }

          Get-Content "release\latest.yml"

      - name: Create published GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" --title "Fuzijska biopsija ${{ github.ref_name }}" --generate-notes
          Get-ChildItem release -File |
            Where-Object { $_.Name -match '\.(exe|yml|blockmap)$' } |
            ForEach-Object { gh release upload "${{ github.ref_name }}" $_.FullName --clobber }
